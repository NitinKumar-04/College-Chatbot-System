<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>College Enquiry Chatbot</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="chat-container">
        <div class="chat-header">
            <div class="header-content">
                <h2>🎓 College Enquiry Bot </h2>
                <p>Ask me anything about admissions, courses, fees, and more!</p>
            </div>
            <div class="status-indicator">
                <span class="status-dot"></span>
                <span class="status-text">Online</span>
            </div>
        </div>
        
        <div class="chat-messages" id="chatMessages">
            <div class="message bot-message">
                <div class="message-content">
                    Hello! 👋 Welcome to College Enquiry Bot. How can I help you today?
                </div>
            </div>
        </div>
        
        <div class="quick-replies" id="quickReplies">
            <button class="quick-reply-btn" data-message="Admission process">🎓 Admission</button>
            <button class="quick-reply-btn" data-message="Courses offered">📚 Courses</button>
            <button class="quick-reply-btn" data-message="Fee structure">💰 Fees</button>
            <button class="quick-reply-btn" data-message="Placement record">💼 Placements</button>
            <button class="quick-reply-btn" data-message="Campus facilities">🏛️ Campus</button>
            <button class="quick-reply-btn" data-message="Contact details">📞 Contact</button>
            <button class="quick-reply-btn" data-message="Exam schedule">📝 Exams</button>
            <button class="quick-reply-btn" data-message="Faculty information">👨‍🏫 Faculty</button>
        </div>
        
        <div class="chat-input-container">
            <input type="text" class="chat-input" id="userInput" placeholder="Type your question here..." autocomplete="off">
            <button class="send-button" id="sendButton">
                <span>Send</span>
                <svg class="send-icon" viewBox="0 0 24 24" width="18" height="18">
                    <path fill="currentColor" d="M2.01 21L23 12 2.01 3 2 10l15 2-15 2z"/>
                </svg>
            </button>
        </div>
    </div>

    <script src="js/javascript.js"></script>
</body>
</html>
